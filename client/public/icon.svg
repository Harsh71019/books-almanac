  <rect x="324" y="140" width="72" height="4" rx="2" fill="rgba(255,240,200,0.25)"/>
  
  <!-- Book 5 (terracotta) - narrow -->
  <rect x="408" y="160" width="22" height="210" rx="5" fill="#cf7d4a"/>
  <rect x="408" y="160" width="5" height="210" rx="5" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Shelf (wooden) -->
  <rect x="64" y="370" width="386" height="22" rx="5" fill="#7d5c30"/>
  <rect x="64" y="388" width="386" height="10" rx="3" fill="#4d3415"/>
  <rect x="64" y="370" width="386" height="5" rx="3" fill="rgba(255,220,150,0.22)"/>
  
