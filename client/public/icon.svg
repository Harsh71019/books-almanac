<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- App background -->
  <rect width="512" height="512" rx="110" fill="#221b13"/>
  
  <!-- Book 1 (dark red) -->
  <rect x="84" y="122" width="66" height="248" rx="7" fill="#c8473f"/>
  <rect x="84" y="122" width="11" height="248" rx="7" fill="rgba(255,255,255,0.18)"/>
  <rect x="84" y="122" width="66" height="4" rx="2" fill="rgba(255,240,200,0.25)"/>
  
  <!-- Book 2 (amber/gold) - tallest -->
  <rect x="162" y="95" width="80" height="275" rx="7" fill="#d8a13a"/>
  <rect x="162" y="95" width="13" height="275" rx="7" fill="rgba(255,255,255,0.18)"/>
  <rect x="162" y="95" width="80" height="4" rx="2" fill="rgba(255,240,200,0.25)"/>
  
  <!-- Book 3 (teal/green) -->
  <rect x="254" y="108" width="58" height="262" rx="7" fill="#6f9a86"/>
  <rect x="254" y="108" width="9" height="262" rx="7" fill="rgba(255,255,255,0.18)"/>
  <rect x="254" y="108" width="58" height="4" rx="2" fill="rgba(255,240,200,0.25)"/>
  
  <!-- Book 4 (rust orange) - slightly shorter -->
  <rect x="324" y="140" width="72" height="230" rx="7" fill="#b15539"/>
