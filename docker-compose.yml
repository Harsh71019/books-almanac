services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: books-app-server
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      UPLOAD_DIR: uploads
      CLIENT_BUILD_DIR: client/dist
    volumes:
      - ./uploads:/app/uploads
    networks:
      - books-app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_GLITCHTIP_DSN: ${VITE_GLITCHTIP_DSN:-}
    image: books-app-client
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3003}:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - books-app-net

networks:
  books-app-net:
    driver: bridge
